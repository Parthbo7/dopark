<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DoParking - Create Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .soft-neumorph-card {
            box-shadow: 0px 12px 32px rgba(74, 64, 224, 0.06);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #d7dee3;
            border-radius: 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center p-4">
<!-- Top Navigation Bar (Suppressed but logic applied for Brand Identity) -->
<header class="w-full max-w-md mb-6 flex justify-between items-center px-2">
<div class="flex items-center gap-2">
<div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-2xl" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<h1 class="text-2xl font-extrabold tracking-tight text-primary">DoParking</h1>
</div>
<button class="p-2 text-outline hover:bg-surface-container-low rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</button>
</header>
<!-- Registration Card -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-[1.5rem] soft-neumorph-card p-8 flex flex-col gap-6 overflow-y-auto custom-scrollbar">
<div class="text-center space-y-1">
<h2 class="text-2xl font-bold text-on-surface tracking-tight">Create Your Account</h2>
<p class="text-on-surface-variant text-sm">Join the network for seamless city parking</p>
</div>
<form action="#" class="space-y-4" method="POST">
<!-- Full Name -->
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-outline ml-1">Full Name</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="person">person</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border border-outline-variant/15 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary transition-all placeholder:text-outline/60 text-on-surface text-sm" placeholder="Enter your full name" type="text"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Phone Number -->
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-outline ml-1">Phone Number</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="phone">phone</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border border-outline-variant/15 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary transition-all placeholder:text-outline/60 text-on-surface text-sm" placeholder="+91 00000 00000" type="tel"/>
</div>
</div>
<!-- Vehicle Type -->
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-outline ml-1">Vehicle Type</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="directions_car">directions_car</span>
<select class="w-full pl-12 pr-10 py-3.5 bg-surface-container-low border border-outline-variant/15 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary appearance-none transition-all text-on-surface text-sm">
<option>Sedan</option>
<option>SUV</option>
<option>Hatchback</option>
<option>EV / Hybrid</option>
<option>Motorbike</option>
</select>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Email Address -->
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-outline ml-1">Email Address</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border border-outline-variant/15 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary transition-all placeholder:text-outline/60 text-on-surface text-sm" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Vehicle Number -->
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-outline ml-1">Vehicle Number</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="license">license</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border border-outline-variant/15 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary transition-all placeholder:text-outline/60 text-on-surface text-sm" placeholder="KA 01 AB 1234" type="text"/>
</div>
</div>
<!-- Password Fields -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-outline ml-1">Password</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border border-outline-variant/15 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary transition-all text-on-surface text-sm" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-outline ml-1">Confirm</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="lock_reset">lock_reset</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border border-outline-variant/15 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary transition-all text-on-surface text-sm" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Verification Checkbox -->
<div class="flex items-start gap-3 pt-2">
<div class="flex items-center h-5">
<input class="w-5 h-5 rounded-lg border-outline-variant bg-surface text-primary focus:ring-primary transition-all cursor-pointer" id="verification" type="checkbox"/>
</div>
<label class="text-xs text-on-surface-variant leading-relaxed cursor-pointer" for="verification">
                    I agree to allow vehicle verification and digital ticketing as per <span class="text-primary font-semibold">Terms of Service</span>.
                </label>
</div>
<!-- Action Button -->
<button class="w-full mt-6 py-4 bg-gradient-to-r from-primary to-primary-dim text-white font-bold rounded-xl shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
                Register
                <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer -->
<div class="text-center py-4 space-y-4">
<p class="text-sm text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Login</a>
</p>
<div class="flex items-center gap-4">
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<span class="text-[10px] font-bold uppercase tracking-widest text-outline">or secure join with</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
</div>
<div class="flex justify-center gap-4">
<button class="w-full flex items-center justify-center py-3 bg-surface border border-outline-variant/15 rounded-xl hover:bg-surface-container-low transition-colors">
<img class="w-5 h-5 grayscale opacity-70 group-hover:grayscale-0 group-hover:opacity-100 transition-all" data-alt="Google company logo icon representing external social authentication method" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCWRjpBl9boJg-o9ueVXHpqmiVLiGPgH001VqCpO6cg_oHCVdDIeSDK9G1-w0y7yZ5TKNfkPO58Lxoy_uzNjyZ8gUenSennTAzka-izj-X61Dvy7aCoz1ZLhFbOxN1Dtw3UOraQqYymP5EuwMh8Sx-rDpk4lr5xawAByzN37tOVQgIXqHtPIptDqCKb7EkTnCVXdvJgFU7OdKLtGiKJ05ovHYeRkYEgBNdWvGK-sIcTSPT8zXVZLf-rMeW7T8SkZFeoG9ySJ8a7WqU"/>
</button>
<button class="w-full flex items-center justify-center py-3 bg-surface border border-outline-variant/15 rounded-xl hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="fingerprint" style="font-variation-settings: 'FILL' 0;">fingerprint</span>
</button>
</div>
</div>
</main>
<!-- Bottom Navigation Bar (Execution from JSON: Icons only, Floating) -->
<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl z-50 flex justify-around items-center py-3 rounded-full shadow-[0px_12px_32px_rgba(74,64,224,0.06)] border border-outline-variant/15">
<a class="text-slate-400 p-3 hover:scale-110 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="login">login</span>
</a>
<a class="bg-indigo-100 text-indigo-800 rounded-full p-3 hover:scale-110 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="person_add" style="font-variation-settings: 'FILL' 1;">person_add</span>
</a>
<a class="text-slate-400 p-3 hover:scale-110 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</a>
</nav>
<!-- Map Background Aesthetic Element -->
<div class="fixed inset-0 -z-10 opacity-[0.03] pointer-events-none">
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,#4a40e0_0%,transparent_70%)]"></div>
<div class="grid grid-cols-8 grid-rows-8 w-full h-full border-outline-variant/10 border"></div>
</div>
</body></html>
