<!DOCTYPE html>

<html class="light" lang="en"><head>

<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .liquid-gradient {
            background: linear-gradient(135deg, #4a40e0 0%, #6448b2 50%, #4647d3 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface selection:bg-primary/30 min-h-screen flex flex-col">
<!-- Top Navigation (Shell Supressed for Transactional Login Flow) -->
<main class="flex-grow flex items-center justify-center px-6 py-12 liquid-gradient relative overflow-hidden">
<!-- Background Ambient Glows -->
<div class="absolute top-0 left-0 w-96 h-96 bg-primary-container/20 rounded-full blur-[120px] -translate-x-1/2 -translate-y-1/2"></div>
<div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-tertiary-container/20 rounded-full blur-[150px] translate-x-1/3 translate-y-1/3"></div>
<!-- Login Card -->
<div class="w-full max-w-[440px] bg-surface-bright rounded-[2rem] shadow-[0px_20px_60px_rgba(26,0,153,0.12)] border border-white/40 overflow-hidden relative z-10">
<!-- Header Section -->
<div class="pt-10 pb-6 px-10 text-center">
<div class="flex justify-center mb-3">
<div class="w-12 h-12 bg-primary/10 rounded-2xl flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">local_parking</span>
</div>
</div>
<h1 class="text-3xl font-extrabold tracking-tighter text-on-surface">Do Parking</h1>
<p class="text-on-surface-variant font-medium mt-1">User Login</p>
<div class="w-full h-px bg-outline-variant/15 mt-8"></div>
</div>
<div class="px-10 pb-10">
<!-- Toggle Switch (Segmented Control) -->
<div class="p-1 bg-surface-container-low rounded-full flex mb-8">
<button class="flex-1 py-2.5 rounded-full text-sm font-bold transition-all liquid-gradient text-on-primary shadow-lg shadow-primary/20">
                        User
                    </button>
<button class="flex-1 py-2.5 rounded-full text-sm font-semibold text-on-surface-variant hover:text-on-surface transition-colors">
                        Admin
                    </button>
</div>
<!-- Form Section -->
<form class="space-y-5">
<div class="space-y-1.5">
<label class="text-[11px] font-bold uppercase tracking-wider text-on-surface-variant/70 ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-lowest border border-outline-variant/30 rounded-xl focus:ring-2 focus:ring-primary-container focus:border-primary transition-all outline-none placeholder:text-outline/50 text-on-surface" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">
<label class="text-[11px] font-bold uppercase tracking-wider text-on-surface-variant/70">Password</label>
<a class="text-[11px] font-bold uppercase tracking-wider text-primary hover:text-primary-dim transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-lowest border border-outline-variant/30 rounded-xl focus:ring-2 focus:ring-primary-container focus:border-primary transition-all outline-none placeholder:text-outline/50 text-on-surface" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center space-x-3 pt-1">
<div class="relative flex items-center">
<input checked="" class="w-5 h-5 rounded border-outline-variant/50 text-primary focus:ring-primary/20 cursor-pointer" id="remember" type="checkbox"/>
</div>
<label class="text-sm font-medium text-on-surface-variant cursor-pointer select-none" for="remember">Remember Me</label>
</div>
<!-- CTA Button -->
<button class="w-full py-4 mt-4 liquid-gradient text-on-primary font-bold rounded-xl shadow-xl shadow-primary/25 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center space-x-2" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="text-sm text-on-surface-variant font-medium">
                        Don’t have an account? 
                        <a class="text-primary font-bold hover:underline ml-1" href="#">Sign Up</a>
</p>
</div>
</div>
</div>
<!-- System Tagline -->
<div class="absolute bottom-8 left-0 right-0 text-center">
<p class="text-on-primary/60 text-xs font-semibold uppercase tracking-[0.2em]">The Luminous Navigator of Smart City Parking</p>
</div>
</main>
<!-- Footer Component (Execution of JSON command) -->
<footer class="bg-[#f3f7fb] dark:bg-slate-950 border-t border-slate-200/10">
<div class="flex flex-col md:flex-row justify-between items-center px-8 py-12 w-full max-w-7xl mx-auto space-y-4 md:space-y-0">
<p class="font-plus-jakarta text-xs uppercase tracking-widest font-semibold text-slate-400">© 2024 Do Parking. All rights reserved.</p>
<div class="flex space-x-8">
<a class="font-plus-jakarta text-xs uppercase tracking-widest font-semibold text-slate-400 hover:text-indigo-500 transition-colors opacity-100 hover:opacity-70" href="#">Privacy Policy</a>
<a class="font-plus-jakarta text-xs uppercase tracking-widest font-semibold text-slate-400 hover:text-indigo-500 transition-colors opacity-100 hover:opacity-70" href="#">Terms of Service</a>
<a class="font-plus-jakarta text-xs uppercase tracking-widest font-semibold text-slate-400 hover:text-indigo-500 transition-colors opacity-100 hover:opacity-70" href="#">Help Center</a>
</div>
</div>
</footer>
</body></html>
